services:
  backend:
    build: ./core
    restart: unless-stopped
    env_file: ./core/.env
    environment:
      REDIS_URL: redis://cache:6379
      OLLAMA_BASE_URL: http://ollama:11434
      APP_ENV: production
    depends_on:
      - cache
      - ollama
    networks:
      - coolify
      - default

  worker:
    build: ./core
    command: uv run arq workers.memory_worker.WorkerSettings
    restart: unless-stopped
    env_file: ./core/.env
    environment:
      REDIS_URL: redis://cache:6379
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - cache
      - ollama

  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_API_BASE: https://api.stefhq.io
    restart: unless-stopped
    environment:
      ORIGIN: https://stefhq.io
    networks:
      - coolify
      - default

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

networks:
  coolify:
    external: true

volumes:
  redis_data:
  ollama_data:
